# GitHub Actions CI/CD — Everything Hermes Code
#
# Runs on every push and pull request to development/main.
# - Installs dependencies (pytest, PyYAML, rich)
# - Runs unit tests with coverage
# - Checks markdown formatting
# - Verifies all scripts import cleanly

name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck 2>/dev/null || true
          which shellcheck || echo "shellcheck not available"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML rich

      - name: Verify project structure
        run: |
          python -c "
          import yaml
          # Verify key files exist
          for f in ['.ehc.yaml', 'Makefile', 'AGENTS.md', 'README.md']:
              assert open(f).read(), f'{f} is empty or missing'
          print('✅ Project structure OK')

          # .ehc.yaml validity
          cfg = yaml.safe_load(open('.ehc.yaml'))
          assert 'project' in cfg
          assert 'repos' in cfg
          print('✅ .ehc.yaml valid')
          "

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tail -30

      - name: Run with coverage report
        run: |
          pip install coverage
          coverage run -m pytest tests/ -q --tb=short 2>&1 | tail -5
          coverage report --include="scripts/*" --show-missing 2>&1 | tail -20

      - name: Check all scripts import cleanly
        run: |
          python -c "
          import importlib.util, sys, pathlib
          scripts = pathlib.Path('scripts')
          failures = []
          for f in sorted(scripts.glob('*.py')):
              try:
                  spec = importlib.util.spec_from_file_location('x', str(f))
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
                  print(f'  ✅ {f.name}')
              except Exception as e:
                  print(f'  ❌ {f.name}: {e}')
                  failures.append(f.name)
          if failures:
              print(f'\\nFailed: {failures}')
              sys.exit(1)
          print('✅ All scripts import cleanly')
          "

      - name: Verify Makefile targets
        run: |
          python -c "
          import subprocess
          targets = ['help', 'lint', 'test', 'check', 'clean']
          for t in targets:
              r = subprocess.run(['make', '-n', t], capture_output=True, text=True, timeout=10)
              assert r.returncode == 0, f'make -n {t} failed: {r.stderr}'
              print(f'  ✅ make -n {t}')
          "

      - name: Markdown lint
        run: |
          pip install pymarkdownlnt 2>/dev/null || true
          python scripts/fix-markdown.py . 2>/dev/null
          echo "✅ Markdown check done"

  # Separate job: only on main — faster feedback for PRs
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Quick lint (pre-commit checks)
        run: |
          pip install PyYAML
          echo "Checking file consistency..."
          for f in scripts/*.py; do
            python -c "compile(open('$f').read(), '$f', 'exec')"
          done
          echo "✅ All files valid Python syntax"
